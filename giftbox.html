<!-- index.html (Gift Box Page) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pick the right gift 🎁</title>
  <link rel="stylesheet" href="giftbox.css" />
</head>
<body>

  <div class="page">

    <header class="card header">
      <h1>Pick the right gift 🎁</h1>
      <p>Only one box knows your birthday. The others are… impostors.</p>
    </header>

    <main class="grid" id="grid">
      <!-- Boxes injected by JS -->
    </main>

    <!-- Toast / Hint -->
    <div class="toast hidden" id="toast">
      <div class="toast-inner">
        <div class="toast-title" id="toastTitle">Nope 😼</div>
        <div class="toast-text" id="toastText">Try again.</div>
        <button class="toast-btn" id="toastBtn">Okay</button>
      </div>
    </div>

  </div>

  <script src="giftbox.js" defer></script>
</body>
</html>
