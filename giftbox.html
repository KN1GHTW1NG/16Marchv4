<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pick the right gift</title>

  <!-- keep these EXACT paths if your folders are /css and /js -->
  <link rel="stylesheet" href="css/giftbox.css">
  <script src="js/giftbox.js" defer></script>
</head>
<body>

  <div class="page">
    <header class="card header">
      <h1>Pick the right gift 🎁</h1>
      <p>Only one box knows your birthday. The others are… impostors.</p>
    </header>

    <main class="grid" id="grid"></main>

    <div class="toast hidden" id="toast">
      <div class="toast-inner">
        <div class="toast-title" id="toastTitle">Nope 😼</div>
        <div class="toast-text" id="toastText">Try again.</div>
        <button class="toast-btn" id="toastBtn">Okay</button>
      </div>
    </div>
  </div>

</body>
</html>
