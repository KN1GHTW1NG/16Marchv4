<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Platform Game</title>

  <link rel="stylesheet" href="css/platform.css?v=202" />
  <script src="js/platform.js?v=202" defer></script>
</head>

<body>
  <div class="wrap" tabindex="0">
    <header class="hud">
      <div class="title">Platform Run <span id="jsBadge" class="badge">JS: …</span></div>
      <div class="sub">Arrow keys / WASD + Space. On phone: D-pad + Jump. Reach the car 🚗</div>

      <div class="progRow">
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="stats">
          <span id="pct">0%</span>
          <span id="m">0m</span>
        </div>
      </div>

      <div class="micro">Tap the game once to activate keyboard input.</div>
      <div id="errBox" class="err hidden"></div>
    </header>

    <main class="stage">
      <canvas id="cv"></canvas>
    </main>

    <footer class="controls" aria-label="controls">
      <div class="dpad">
        <button class="btn up" id="upBtn">▲</button>
        <button class="btn left" id="leftBtn">◀</button>
        <button class="btn right" id="rightBtn">▶</button>
        <button class="btn down" id="downBtn">▼</button>
      </div>

      <button class="jump" id="jumpBtn">JUMP</button>
    </footer>

    <div class="overlay hidden" id="win">
      <div class="modal">
        <div class="h1">Congratulations 🎉</div>
        <div class="p">You reached the car. Ready for the next challenge?</div>
        <div class="row">
          <button class="pill primary" id="continue">Continue</button>
          <button class="pill" id="replay">Replay</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
