<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Navigate the Day 🌤️</title>

  <link rel="stylesheet" href="css/platform.css" />
  <script src="js/platform.js" defer></script>
</head>

<body>

  <div class="app">

    <!-- Header -->
    <header class="hud">
      <h1>Navigate the Day 🌤️</h1>
      <p class="caption">Jump the gaps. Reach the car.</p>

      <!-- Progress Bar -->
      <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="percent" id="percent">0%</div>
    </header>

    <!-- Game Area -->
    <main class="stage">
      <canvas id="game"></canvas>
    </main>

    <!-- Controls -->
    <footer class="controls">
      <button class="control-btn" id="leftBtn">◀</button>
      <button class="control-btn jump" id="jumpBtn">JUMP</button>
      <button class="control-btn" id="rightBtn">▶</button>
    </footer>

    <!-- Win Overlay -->
    <div class="overlay hidden" id="winBox">
      <div class="modal">
        <h2>You made it 💗</h2>
        <p>Destination unlocked.</p>
        <button id="continueBtn">Continue</button>
      </div>
    </div>

  </div>

</body>
</html>
